<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNA 1 v7 Modules 8-10 Exam Practice</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 650px;
            width: 100%;
        }
        .progress {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .score-box {
            font-size: 14px;
            color: #0071e3;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: right;
        }
        .question {
            font-size: 19px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-btn {
            background-color: #f2f2f7;
            color: #1d1d1f;
            border: 1px solid #d2d2d7;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-weight: 500;
            line-height: 1.4;
        }
        .option-btn:hover {
            background-color: #e5e5ea;
        }
        .option-btn.correct {
            background-color: #34c759 !important;
            color: white !important;
            border-color: #34c759 !important;
        }
        .option-btn.wrong {
            background-color: #ff3b30 !important;
            color: white !important;
            border-color: #ff3b30 !important;
        }
        .option-btn:disabled {
            pointer-events: none;
        }
        .next-container {
            display: flex;
            justify-content: flex-end;
        }
        .btn-next {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: none;
        }
        .btn-next:hover {
            background-color: #0077ed;
        }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div class="progress" id="progress">Question 1 / 76</div>
        <div class="score-box" id="scoreBox">Correct: 0 | Wrong: 0</div>
    </div>
    <div class="question" id="question">Loading question...</div>
    
    <div class="options-container" id="optionsContainer">
        </div>
    
    <div class="next-container">
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next Question ➜</button>
    </div>
</div>

<script>
    const rawQuizData = [
        { q: "1. Which piece of information is used by a router to determine the next hop path?", correct: "destination IP address", distractors: ["source IP address", "source MAC address", "destination MAC address"] },
        { q: "2. A computer has to send a packet to a destination host in the same local network. How will the packet be sent?", correct: "The packet will be sent directly to the destination host.", distractors: ["The packet will be sent to the default gateway first.", "The packet will be sent via a broadcast to all networks.", "The packet will be dropped by the network adapter."] },
        { q: "3. A router receives a packet from the G0/0 interface and determines it needs to be forwarded out G0/1. What does the router do next?", correct: "Creates a new Layer 2 Ethernet frame encapsulated with the packet.", distractors: ["Keeps the same Layer 2 frame and changes the source IP.", "Drops the payload and only sends the header.", "Sends an ARP request back out the G0/0 interface."] },
        { q: "4. Which IPv4 address can a host use to ping the loopback interface?", correct: "127.0.0.1", distractors: ["255.255.255.255", "0.0.0.0", "169.254.0.1"] },
        { q: "5. A computer can access devices on the same network but cannot access devices on external networks. What is the likely cause?", correct: "The default gateway address is incorrect or missing.", distractors: ["The host IP address is a duplicate.", "The network cable is completely disconnected.", "The subnet mask is configured incorrectly."] },
        { q: "6. Which characteristic describes the IPv4 protocol?", correct: "It relies on upper-layer protocols to handle missing or out-of-sequence packets.", distractors: ["It guarantees delivery of all transmitted packets.", "It establishes a dedicated connection before sending data.", "It operates entirely at the Data Link layer."] },
        { q: "7. Why is NAT not needed in IPv6?", correct: "Any host can have a unique public IPv6 address due to the massive address space.", distractors: ["IPv6 has built-in security features that replace NAT.", "IPv6 does not use any broadcast or multicast packets.", "IPv6 automatically encrypts all end-to-end traffic."] },
        { q: "8. Which parameter does a router use to choose the best path when multiple routes are available to the same destination?", correct: "the lowest metric value", distractors: ["the highest interface bandwidth", "the highest administrative distance", "the highest next-hop IP address"] },
        { q: "9. Which two services are provided by the OSI network layer? (Choose two)", correct: "routing packets toward the destination and encapsulating PDUs from the transport layer", distractors: ["flow control and error detection", "collision detection and session management", "data encryption and media access control"] },
        { q: "10. What is the purpose of configuring a default gateway on a switch?", correct: "to provide remote management access to the switch from a different network", distractors: ["to allow the switch to route traffic between different VLANs", "to enable the switch to act as a DHCP server for local hosts", "to increase the frame forwarding speed across Layer 2 ports"] },
        { q: "11. What is a basic characteristic of the IP protocol?", correct: "connectionless", distractors: ["media dependent", "reliable packet delivery", "end-to-end connection oriented"] },
        { q: "12. Which field in the IPv4 header is used to prevent a packet from traversing a network endlessly?", correct: "Time to Live", distractors: ["Header Checksum", "Identification", "Fragment Offset"] },
        { q: "13. What is an advantage of the simplified IPv6 header over IPv4?", correct: "efficient packet handling", distractors: ["smaller header size than IPv4", "mandatory fragmentation at intermediate routers", "elimination of the source IP address field"] },
        { q: "14. Which IPv4 header field identifies the upper-layer protocol carried in the packet?", correct: "Protocol", distractors: ["Flags", "Version", "Total Length"] },
        { q: "15. Which IPv6 address is the equivalent of the IPv4 loopback address 127.0.0.1?", correct: "::1", distractors: ["FE80::1", "2001::1", "FF02::1"] },
        { q: "16. What does a successful ping to the loopback address indicate?", correct: "The TCP/IP stack on the device is functioning correctly.", distractors: ["The network cable is correctly attached to the switch.", "The device has successful end-to-end internet connectivity.", "The DHCP configuration has assigned a valid IP address."] },
        { q: "17. Which command is used on a Cisco router to view the routing table?", correct: "show ip route", distractors: ["show ip interface brief", "show running-config", "show arp"] },
        { q: "18. Which command displays the routing table on a Windows host?", correct: "route print", distractors: ["ipconfig /all", "arp -a", "ping localhost"] },
        { q: "19. What does the RAM of a Cisco router store during active operation?", correct: "IP routing table and running configuration file", distractors: ["startup configuration file", "Cisco IOS operating system image", "POST self-diagnostic software"] },
        { q: "20. What is the primary function of the Address Resolution Protocol (ARP)?", correct: "mapping a known IPv4 address to a destination MAC address", distractors: ["mapping a known MAC address to a local IP address", "assigning dynamic IP addresses to client workstations", "resolving domain names to destination IP addresses"] },
        { q: "21. How is an ARP request broadcasted over the local network segment?", correct: "as a Layer 2 broadcast frame targeting all local devices", distractors: ["as a Layer 3 unicast packet sent straight to the router", "as a Layer 4 multicast stream targeting registered hosts", "as an Anycast frame targeting the nearest switch"] },
        { q: "22. What is the destination MAC address contained in an Ethernet frame that carries an ARP request?", correct: "FF:FF:FF:FF:FF:FF", distractors: ["00:00:00:00:00:00", "127.0.0.1", "the MAC address of the default gateway"] },
        { q: "23. What happens when the 'arp -d *' command is executed on a Windows PC?", correct: "The entire ARP cache is cleared of all entries.", distractors: ["The current MAC address table is printed to the screen.", "An ARP request is forcibly sent to every network node.", "The dynamic MAC address learning feature is disabled."] },
        { q: "24. What is a potential disadvantage of excessive ARP broadcasts in a large network?", correct: "They can consume significant network bandwidth and reduce overall host performance.", distractors: ["They can expose cleartext user passwords to the network.", "They cause the payload of standard data packets to drop.", "They drastically increase the size of the Layer 3 IP header."] },
        { q: "25. Which device responds to an ARP request from a local host looking for a destination on a remote network?", correct: "the local router interface serving as the default gateway", distractors: ["the actual destination server located out on the Internet", "the central Layer 2 switch inside the local LAN", "the DHCP server that originally allocated the IP address"] },
        { q: "26. What does a line code prefix of 'C' indicate when viewing the IP routing table on a Cisco router?", correct: "a directly connected network", distractors: ["a route learned dynamically via RIP", "a manually configured static route", "a network interface that is temporarily down"] },
        { q: "27. What does the 'S' code character represent in a Cisco routing table?", correct: "static route", distractors: ["OSPF learned route", "directly connected network", "BGP learned route"] },
        { q: "28. What does the term 'next-hop' refer to in packet forwarding?", correct: "the IP address of the next router interface along the path", distractors: ["the physical MAC address of the ultimate destination host", "the maximum number of routers a packet can traverse", "the physical outbound egress port of the current router"] },
        { q: "29. Where is the startup configuration file stored on a Cisco router?", correct: "NVRAM", distractors: ["RAM", "Flash memory", "ROM"] },
        { q: "30. Where is the Cisco IOS Software system image typically stored?", correct: "Flash memory", distractors: ["RAM", "NVRAM", "ROM"] },
        { q: "31. If a router boots up and automatically enters 'Setup mode', what is the reason?", correct: "The startup-config file is missing or empty in NVRAM.", distractors: ["The Cisco IOS file is corrupted or missing from Flash.", "The router hardware has experienced an overheat condition.", "The administrator is holding down the physical reset button."] },
        { q: "32. What is the correct sequence of steps during a standard Cisco router boot-up process?", correct: "Perform POST -> Load bootloader -> Locate and load IOS -> Locate and load startup-config", distractors: ["Load IOS -> Perform POST -> Locate config -> Load bootloader", "Locate config -> Load bootloader -> Perform POST -> Load IOS", "Perform POST -> Locate config -> Load IOS -> Load bootloader"] },
        { q: "33. What is the effect of configuring the 'ip default-gateway 192.168.1.1' command on a Layer 2 switch?", correct: "It allows the switch to be managed remotely from a host on another network.", distractors: ["It upgrades the switch to perform Layer 3 routing functions.", "It permits local connected PCs to access the Internet directly.", "It blocks loops from forming within the local broadcast domain."] },
        { q: "34. What is the result of applying the 'transport input ssh' command on the VTY lines of a switch?", correct: "It restricts remote access connections exclusively to encrypted SSH, blocking unencrypted Telnet.", distractors: ["It enables the switch to pass secure HTTPS web traffic.", "It activates secure file transfer protocols like SFTP.", "It restricts physical console port access to the switch configuration."] },
        { q: "35. Which IPv6 protocol provides functions equivalent to the IPv4 Address Resolution Protocol (ARP)?", correct: "Neighbor Discovery Protocol (NDP)", distractors: ["ARPv6 upgrade protocol", "DHCPv6 stateless autoconfiguration", "ICMPv6 Echo Request"] },
        { q: "36. What is the purpose of an IPv6 Neighbor Solicitation (NS) message?", correct: "to determine the Layer 2 MAC address of a known destination IPv6 address", distractors: ["to dynamically request an autoconfigured IP address from a router", "to verify if an IP address is a duplicate within the network", "to poll whether a default gateway router is still reachable"] },
        { q: "37. What is the purpose of an IPv6 Neighbor Advertisement (NA) message?", correct: "to respond to an NS message by providing the requested MAC address", distractors: ["to reject an invalid network connection request", "to request a router to send updated configuration prefixes", "to advertise local routing tables to neighboring routers"] },
        { q: "38. When a router looks for a path to forward a packet, which route will it select based on prefix length?", correct: "the route with the longest prefix match", distractors: ["the route with the shortest prefix match", "the route with the lowest next-hop IP value", "the first route statement listed in the running config"] },
        { q: "39. Which command saves the configuration currently running in volatile memory to non-volatile memory?", correct: "copy running-config startup-config", distractors: ["copy startup-config running-config", "save configuration to flash", "write erase"] },
        { q: "40. Which hardware component handles packet switching independently of the main CPU on high-performance devices?", correct: "ASIC (Application-Specific Integrated Circuit)", distractors: ["Main system CPU", "Dynamic RAM (DRAM)", "Digital Signal Processor (DSP)"] },
        { q: "41. How is a default route represented in an IPv4 routing table?", correct: "0.0.0.0/0", distractors: ["255.255.255.255/32", "127.0.0.1/8", "10.0.0.0/8"] },
        { q: "42. What type of address is a MAC address?", correct: "A physical address burned into the ROM of the network interface card.", distractors: ["A logical address assigned dynamically by software.", "A network-wide hierarchical logical layer address.", "A port-level interface socket address definition."] },
        { q: "43. What is the size of the 'Version' field in an IPv4 packet header?", correct: "4 bits", distractors: ["8 bits", "32 bits", "6 bits"] },
        { q: "44. What happens to an IPv4 packet when its TTL value reaches 0?", correct: "The router drops the packet and sends an ICMP Time Exceeded message to the source.", distractors: ["The router automatically forwards the packet along a default route.", "The packet remains queued inside the router buffer permanently.", "The router duplicates the packet and floods it out all active ports."] },
        { q: "45. Which field in an IPv6 header performs the same function as the TTL field in an IPv4 header?", correct: "Hop Limit", distractors: ["Traffic Class", "Flow Label", "Next Header"] },
        { q: "46. What is the fixed size of a standard IPv6 packet header?", correct: "40 bytes", distractors: ["20 bytes", "60 bytes", "8 bytes"] },
        { q: "47. How many IP addresses are included in an IPv6 header, and what is their size?", correct: "Two addresses (Source and Destination), each 128 bits in size.", distractors: ["One destination address, 64 bits in size.", "Two addresses, each 32 bits in size.", "Four addresses, each 48 bits in size."] },
        { q: "48. When a host sends data to a server on a remote network, what is the destination MAC address of the Layer 2 frame?", correct: "the MAC address of the local router's default gateway interface", distractors: ["the actual physical MAC address of the destination server", "the standard layer 2 broadcast address FF:FF:FF:FF:FF:FF", "the hardware MAC address of the intermediate network switch"] },
        { q: "49. When a host sends data to a server on a remote network, what is the destination IP address of the Layer 3 packet?", correct: "the IP address of the destination server", distractors: ["the IP address of the default gateway interface", "the public IP address of the edge gateway router", "the internal loopback address of the core switch"] },
        { q: "50. Which command provides a quick summary status of all network interfaces on a Cisco router?", correct: "show ip interface brief", distractors: ["show ip route", "show interfaces description", "show protocols status"] },
        { q: "51. What does the Administrative Distance (AD) value represent in a routing table?", correct: "the trustworthiness and preference of the route source", distractors: ["the maximum available bandwidth along the pathway", "the total count of intermediate routers to be traversed", "the round-trip latency value measured in milliseconds"] },
        { q: "52. What is the default Administrative Distance (AD) of a manually configured static route?", correct: "1", distractors: ["0", "110", "90"] },
        { q: "53. What is the default Administrative Distance (AD) of a directly connected network interface?", correct: "0", distractors: ["1", "5", "100"] },
        { q: "54. What is the primary responsibility of the OSI Network Layer (Layer 3)?", correct: "providing logical addressing and routing packets across interconnected networks", distractors: ["ensuring error-free bit transmission across physical media", "managing structured dialogs and sessions between applications", "detecting and recovering frame data corruptions on a cable segment"] },
        { q: "55. Does the IP protocol guarantee that all transmitted packets will be delivered successfully?", correct: "No, IP is a connectionless, unreliable protocol that does not use acknowledgments.", distractors: ["Yes, through built-in three-way handshake connection controls.", "Yes, IP automatically retransmits any packet lost during transit.", "It only guarantees delivery when traversing local LAN topologies."] },
        { q: "56. What does it mean that the IP protocol is 'Media Independent'?", correct: "It can carry packets over any physical medium (copper, fiber, wireless) without altering the packet structure.", distractors: ["It increases the software processing speed of host OS network adapters.", "It inherently secures data payloads from intercepting hackers.", "It remains backward compatible with older legacy hub topologies."] },
        { q: "57. What term refers to the maximum size of a packet that can be transmitted across a medium without fragmentation?", correct: "MTU (Maximum Transmission Unit)", distractors: ["TTL", "Window Size", "Bandwidth Capacity"] },
        { q: "58. Which field in an IPv4 header is utilized to handle Quality of Service (QoS) classification?", correct: "Differentiated Services (DiffServ)", distractors: ["Total Length", "Identification", "Fragment Offset"] },
        { q: "59. Which two fields are present in both the IPv4 header and the IPv6 header? (Choose two)", correct: "Version and Source IP Address", distractors: ["TTL and Hop Limit", "Protocol and Next Header", "Total Length and Payload Length"] },
        { q: "60. Which command clears the existing active configuration file on a Cisco router back to factory defaults?", correct: "erase startup-config then reload", distractors: ["delete running-config", "clear ip route *", "remove configuration startup"] },
        { q: "61. Which device filters and forwards local LAN traffic strictly based on Layer 2 MAC addresses?", correct: "Switch", distractors: ["Router", "Hub", "Repeater"] },
        { q: "62. How long do entries typically remain inside a host's ARP cache?", correct: "They are stored temporarily for a short duration unless refreshed by active traffic.", distractors: ["They remain permanently until the hardware completely powers down.", "They clear instantly as soon as a single data frame is transmitted.", "They write permanently into a hard drive partition or Flash storage."] },
        { q: "63. Which command is used on a Cisco router to inspect the current contents of the ARP table?", correct: "show arp", distractors: ["show ip arp table", "show mac address-table", "show ip route arp"] },
        { q: "64. When does a device trigger a 'Proxy ARP' behavior?", correct: "When a host sends an ARP request for a remote network host because it lacks a proper default gateway configuration.", distractors: ["When trying to enhance end-to-end security across an entire network core.", "When establishing a virtual web hosting map for inbound internet users.", "When a local switch tries to assign an alternative dynamic IP address."] },
        { q: "65. What security risk is introduced by an unmitigated 'ARP Spoofing' attack?", correct: "An attacker can intercept private data traffic or execute a Man-in-the-Middle attack.", distractors: ["An attacker can completely trip the physical power supplies of switches.", "An attacker can gain unauthorized administrative shell root access on routers.", "An attacker can permanently alter the hardware real-time clocks of client nodes."] },
        { q: "66. Which command is used within interface configuration mode to enable an administratively disabled Cisco interface?", correct: "no shutdown", distractors: ["enable interface", "turn on", "port startup"] },
        { q: "67. What is a key characteristic of Dynamic Routing?", correct: "Routers automatically share network topology information using routing protocols.", distractors: ["Administrators must manually input every destination route command line by line.", "The entire active routing database purges out completely every 5 minutes.", "It can only run if the local network completely excludes switches."] },
        { q: "68. What is the function of the 'Flow Label' field in an IPv6 header?", correct: "to maintain the proper packet sequence of a specific application traffic stream", distractors: ["to restrict the maximum router count a packet can safely cross", "to indicate whether the underlying upper-layer protocol is TCP or UDP", "to hold error detection bits ensuring total payload integrity validation"] },
        { q: "69. Do intermediate routers fragment IPv6 packets during transit if they exceed an interface MTU?", correct: "No, IPv6 routers do not perform fragmentation. The source host manages this via Path MTU Discovery.", distractors: ["Yes, routers fragment any IPv6 packet larger than 1500 bytes.", "Fragmentation occurs only if the packet is crossing a wireless Wi-Fi media segment.", "Yes, but exclusively when transporting high-bandwidth streaming video traffic."] },
        { q: "70. What does the 'Gateway of last resort' designation indicate in a routing table output?", correct: "a default route used to forward packets when no specific match exists", distractors: ["a backup router interface utilized only during a hardware failure", "the static IP configuration pointing directly to a local DNS system", "the route statement carrying the worst possible metric value score"] },
        { q: "71. What is the correct syntax for configuring a basic IPv4 static route on a Cisco router?", correct: "ip route [network-address] [subnet-mask] [next-hop-ip]", distractors: ["router static [network] [next-hop]", "ip route-static [network] [subnet-mask]", "set static path [network] via [next-hop]"] },
        { q: "72. Which keyboard key automatically completes a partially typed keyword command on a Cisco CLI session?", correct: "Tab key", distractors: ["Spacebar", "Enter key", "Escape key"] },
        { q: "73. Which key combination aborts an active command process, such as an active extended ping sequence, on a Cisco terminal?", correct: "Ctrl + Shift + 6", distractors: ["Ctrl + C", "Ctrl + Z", "Cmd + X"] },
        { q: "74. How does a source host determine whether a target destination IP address resides outside its own local network?", correct: "It compares the target destination IP against its own configuration using its configured subnet mask.", distractors: ["It queries the local layer 2 switch to see if it holds the target MAC address.", "It checks whether the target domain name suffix matches external generic extensions.", "It sends a probe frame out and monitors if a response comes back under 1 second."] },
        { q: "75. Which international standard defines the operational structure and framing specifications for Ethernet technologies?", correct: "IEEE 802.3", distractors: ["IEEE 802.11", "RFC 1918", "ISO 9001"] },
        { q: "76. What are the two primary components required to enable communication between separate networks?", correct: "Logical IP addressing (Layer 3) and routing devices (routers).", distractors: ["High-speed Category 6 cabling and standard RJ-45 termination modular connectors.", "Physical MAC addressing definitions and Layer 2 interconnect switches.", "Secure data encryption algorithms and physical next-generation firewalls."] }
    ];

    let quizData = [];
    let currentIndex = 0;
    let correctCount = 0;
    let wrongCount = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        quizData = rawQuizData.map((item) => {
            const options = shuffle([item.correct, ...item.distractors]);
            return {
                q: item.q,
                correct: item.correct,
                options: options
            };
        });
    }

    function loadQuestion() {
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.style.display = "none";
        
        if (currentIndex < quizData.length) {
            document.getElementById("progress").innerText = `Question ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById("question").innerText = quizData[currentIndex].q;
            
            const container = document.getElementById("optionsContainer");
            container.innerHTML = "";

            quizData[currentIndex].options.forEach((opt) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = opt;
                button.onclick = () => checkAnswer(button, opt);
                container.appendChild(button);
            });
        } else {
            document.getElementById("progress").innerText = "Completed!";
            document.getElementById("question").innerText = `🎉 You have completed all 76 questions! \nResult: Correct ${correctCount} | Wrong ${wrongCount}. Good luck with your exam tomorrow!`;
            document.getElementById("optionsContainer").innerHTML = "";
            nextBtn.style.display = "none";
        }
    }

    function checkAnswer(selectedButton, selectedOption) {
        const currentQuestion = quizData[currentIndex];
        const buttons = document.querySelectorAll(".option-btn");
        const nextBtn = document.getElementById("nextBtn");

        buttons.forEach(btn => btn.disabled = true);

        if (selectedOption === currentQuestion.correct) {
            selectedButton.classList.add("correct");
            correctCount++;
        } else {
            selectedButton.classList.add("wrong");
            wrongCount++;
            buttons.forEach(btn => {
                if (btn.innerText === currentQuestion.correct) {
                    btn.classList.add("correct");
                }
            });
        }

        document.getElementById("scoreBox").innerText = `Correct: ${correctCount} | Wrong: ${wrongCount}`;
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        loadQuestion();
    }

    initQuiz();
    loadQuestion();
</script>

</body>
</html>
